# docker-compose.override.yml — Development overrides (auto-merged by docker compose up)

services:
  backend:
    build:
      target: development
    dns:
      # Explicit public DNS — same rationale as embedding service.
      # Without this, VPN clients on the host can block resolution of
      # crates.io (cargo metadata / cargo run in dev mode).
      - 8.8.8.8
      - 1.1.1.1
    ports:
      - "${BACKEND_PORT:-3000}:3000"
      - "2345:2345" # Debug port (Delve)
    volumes:
      - ./backend/src:/app/src
      - ./backend/Cargo.toml:/app/Cargo.toml
      - ./backend/Cargo.lock:/app/Cargo.lock
    environment:
      RUST_LOG: debug
      CARGO_TARGET_DIR: /app/target
    # Dev stage (rust:1.96-slim-bookworm) lacks curl — use TCP check instead.
    healthcheck:
      test: ["CMD-SHELL", "bash -c '</dev/tcp/localhost/3000'"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 90s
    command: cargo watch -x run

  embedding:
    build:
      target: development
    ports:
      # Port 8001 is occupied on this host; using 18001 instead
      # Set EMBEDDING_PORT env var to override.
      - "${EMBEDDING_PORT:-18001}:8001"
    volumes:
      - ./embedding/src:/app/src
      - ./embedding/pyproject.toml:/app/pyproject.toml
      - ./embedding/uv.lock:/app/uv.lock
    environment:
      LOG_LEVEL: debug

  frontend:
    build:
      target: development
    ports:
      - "${FRONTEND_PORT:-5173}:5173"
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/index.html:/app/index.html
      - ./frontend/vite.config.ts:/app/vite.config.ts
      - ./frontend/tsconfig.json:/app/tsconfig.json
      - ./frontend/tsconfig.app.json:/app/tsconfig.app.json
      - ./frontend/package.json:/app/package.json
    environment:
      NODE_ENV: development
      VITE_KEYCLOAK_PROXY_TARGET: http://keycloak:8080
      VITE_API_PROXY_TARGET: http://backend:3000
    # Dev server (Vite) runs on port 5173, not nginx on 80.
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:5173/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  keycloak-db:
    ports: []

  keycloak:
    ports:
      - "${KEYCLOAK_DEBUG_PORT:-5005}:5005" # KeyCloak debug port (optional)

  chroma:
    ports:
      - "${CHROMA_PORT:-8000}:8000"
