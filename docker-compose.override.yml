# docker-compose.override.yml — Development overrides (auto-merged by docker compose up)

services:
  backend:
    build:
      target: development
    dns:
      # Explicit public DNS — prevents VPN clients on the host from blocking
      # resolution of crates.io (cargo metadata / cargo run in dev mode).
      - 8.8.8.8
      - 1.1.1.1
    ports:
      - "${BACKEND_PORT:-3000}:3000"
      - "2345:2345" # Debug port (Delve)
    volumes:
      - ./backend/src:/app/src
      - ./backend/Cargo.toml:/app/Cargo.toml
      - ./backend/Cargo.lock:/app/Cargo.lock
      - ./backend/migrations:/app/migrations
    environment:
      RUST_LOG: debug
      CARGO_TARGET_DIR: /app/target
      ENVIRONMENT: development
    # Dev stage (rust:1.96-slim-bookworm) lacks curl — use TCP check instead.
    healthcheck:
      test: ["CMD-SHELL", "bash -c '</dev/tcp/localhost/3000'"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 90s
    command: cargo watch -x run --ignore data/

  frontend:
    build:
      target: development
    ports:
      - "${FRONTEND_PORT:-5173}:5173"
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/index.html:/app/index.html
      - ./frontend/vite.config.ts:/app/vite.config.ts
      - ./frontend/tsconfig.json:/app/tsconfig.json
      - ./frontend/tsconfig.app.json:/app/tsconfig.app.json
      - ./frontend/package.json:/app/package.json
    environment:
      NODE_ENV: development
      VITE_KEYCLOAK_PROXY_TARGET: http://keycloak:8080
      VITE_API_PROXY_TARGET: http://backend:3000
      VITE_OTEL_COLLECTOR_URL: http://otel-collector:4318/v1/logs
      VITE_ENVIRONMENT: development
    # Dev server (Vite) runs on port 5173, not nginx on 80.
    # Use node -e for healthcheck since node:22-alpine lacks wget/curl.
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "require('http').get('http://localhost:5173/', r => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))",
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  db:
    ports:
      - "5432:5432"

  keycloak:
    ports:
      - "${KEYCLOAK_DEBUG_PORT:-5005}:5005" # KeyCloak debug port (optional)

  chroma:
    ports:
      - "${CHROMA_PORT:-8000}:8000"
