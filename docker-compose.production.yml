# docker-compose.production.yml — Production hardening
# Usage: docker compose -f docker-compose.yml -f docker-compose.production.yml up -d
# NOTE: No ports exposed on infrastructure services (chroma). They communicate
# via Docker network only. Only Caddy exposes ports 80/443 to the host.

x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "20m"
    max-file: "5"

x-security: &default-security
  read_only: true
  security_opt:
    - no-new-privileges:true
  cap_drop:
    - ALL

services:
  caddy:
    image: caddy:2.8-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - internal
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:80/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    logging: *default-logging

  backend:
    <<: *default-security
    user: "1001:1001"
    tmpfs:
      - /tmp:noexec,nosuid,size=100m
    volumes:
      - git_repos:/app/data/git-repos
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
          pids: 100
        reservations:
          cpus: "0.25"
          memory: 128M
    logging: *default-logging
    ports: []
    depends_on:
      caddy:
        condition: service_started

  chroma:
    <<: *default-security
    read_only: false # Chroma needs writable for persistence
    user: ""
    tmpfs:
      - /tmp:noexec,nosuid,size=100m
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1G
          pids: 100
        reservations:
          cpus: "0.5"
          memory: 512M
    logging: *default-logging
    ports: []

  frontend:
    <<: *default-security
    user: "1001:1001"
    tmpfs:
      - /tmp:noexec,nosuid,size=100m
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 128M
          pids: 50
        reservations:
          cpus: "0.1"
          memory: 64M
    logging: *default-logging
    ports: []

  keycloak-init:
    logging: *default-logging

  db:
    <<: *default-security
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
        reservations:
          cpus: "0.25"
          memory: 128M
    logging: *default-logging
    ports: []

  keycloak:
    ports: []

  otel-collector:
    <<: *default-security
    user: "1001:1001"
    tmpfs:
      - /tmp:noexec,nosuid,size=100m
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
          pids: 50
        reservations:
          cpus: "0.1"
          memory: 128M
    logging: *default-logging
    ports: []
    environment:
      ENVIRONMENT: production
    depends_on:
      caddy:
        condition: service_started

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    privileged: true # Required for cAdvisor to access host cgroups/containers
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
    networks:
      - internal
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
        reservations:
          cpus: "0.1"
          memory: 128M
    logging: *default-logging
    ports: []

  prometheus:
    image: prom/prometheus:latest
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    networks:
      - internal
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
        reservations:
          cpus: "0.25"
          memory: 256M
    logging: *default-logging
    ports: []
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.retention.time=15d
      - --storage.tsdb.path=/prometheus

  grafana:
    image: grafana/grafana:latest
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - ./grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
    networks:
      - internal
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
        reservations:
          cpus: "0.1"
          memory: 128M
    logging: *default-logging
    ports: []
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GF_SECURITY_ADMIN_PASSWORD:-CHANGEME-grafana-password}
      GF_INSTALL_PLUGINS: ""
    depends_on:
      - prometheus

networks:
  internal:
    driver: bridge

volumes:
  caddy_data:
  caddy_config:
  git_repos:
  prometheus_data:
  grafana_data:
