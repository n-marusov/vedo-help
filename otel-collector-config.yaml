# OpenTelemetry Collector configuration
# Receives OTLP from all services via gRPC and HTTP, batches, enriches with resource
# attributes, and exports to stdout (debug) and optionally to a backend.
#
# Dev: debug exporter to stdout (visible via `docker compose logs otel-collector`)
# Prod: debug exporter disabled; file exporter or Loki configured in production override

receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  batch:
    timeout: 1s
    send_batch_size: 1024
  memory_limiter:
    check_interval: 1s
    limit_mib: 512
    spike_limit_mib: 64
  resourcedetection:
    detectors:
      - env
      - docker
    timeout: 2s

exporters:
  debug:
    verbosity: detailed
    sampling_initial: 5
    sampling_thereafter: 200

service:
  pipelines:
    logs:
      receivers:
        - otlp
      processors:
        - memory_limiter
        - resourcedetection
        - batch
      exporters:
        - debug
    traces:
      receivers:
        - otlp
      processors:
        - memory_limiter
        - batch
      exporters:
        - debug
    metrics:
      receivers:
        - otlp
      processors:
        - memory_limiter
        - batch
      exporters:
        - debug
