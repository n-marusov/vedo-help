# docker-compose.yml — Base configuration (shared between dev and prod)
# Dev: docker compose up (auto-merges docker-compose.override.yml)
# Prod: docker compose -f docker-compose.yml -f docker-compose.production.yml up -d

name: ${COMPOSE_PROJECT_NAME:-vedo}

services:
  chroma:
    image: chromadb/chroma:0.6.2
    environment:
      - IS_PERSISTENT=TRUE
    volumes:
      - chroma_data:/chroma/chroma
    networks:
      - internal
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/heartbeat')",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  embedding:
    build:
      context: ./embedding
      target: production
    dns:
      # Явные публичные DNS — контейнер не зависит от DNS хост-системы (VPN).
      # Без этого VPN-клиент может заблокировать разрешение huggingface.co.
      - 8.8.8.8
      - 1.1.1.1
    environment:
      - EMBEDDING_MODEL=BAAI/bge-small-en-v1.5
      - CACHE_DIR=/data/cache
    volumes:
      - embedding_cache:/data/cache
    networks:
      - internal
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8001/health')",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    depends_on:
      chroma:
        condition: service_healthy

  backend:
    build:
      context: ./backend
      target: production
    env_file: .env
    environment:
      # Keep issuer validation aligned with browser-issued tokens while letting
      # the backend fetch JWKS over Docker's internal network.
      KEYCLOAK_PUBLIC_URL: "${KEYCLOAK_PUBLIC_URL:-http://localhost:8080}"
      KEYCLOAK_JWKS_URL: "${KEYCLOAK_JWKS_URL:-http://keycloak:8080}"
      # Internal service discovery — use Docker service names, not localhost
      CHROMA_URL: "${CHROMA_URL:-http://chroma:8000}"
      EMBEDDING_SERVICE_URL: "${EMBEDDING_SERVICE_URL:-http://embedding:8001}"
      DATABASE_URL: ${DATABASE_URL:-postgres://vedo:CHANGEME-db-password@db:5432/vedo}
    ports:
      - "${BACKEND_PORT:-3000}:3000"
    networks:
      - internal
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 40s
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      target: production
    networks:
      - internal
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:80/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    depends_on:
      - backend

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-CHANGEME-postgres-password}
      VEDO_DB_PASSWORD: ${VEDO_DB_PASSWORD:-CHANGEME-vedo-password}
      KEYCLOAK_DB_PASSWORD: ${KEYCLOAK_DB_PASSWORD:-CHANGEME-keycloak-password}
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./scripts/init-db.sh:/docker-entrypoint-initdb.d/init-db.sh:ro
    networks:
      - internal
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # Pre-start: validate env vars, substitute into realm-import template.
  # Produces realm-import.json (gitignored) from the template for Keycloak import.
  keycloak-init:
    image: alpine:3.19
    # Explicit public DNS — same rationale as embedding service.
    # Without this, VPN clients on the host can break resolution of
    # dl-cdn.alpinelinux.org, which makes `apk add gettext` fail at
    # startup with a "temporary error (try again later)" fetch error.
    dns:
      - 8.8.8.8
      - 1.1.1.1
    volumes:
      - keycloak_import:/import
      - ./keycloak/realm-import.json.template:/template:ro
    environment:
      VEDO_BACKEND_CLIENT_SECRET: ${VEDO_BACKEND_CLIENT_SECRET:-changeme-vedo-backend-secret}
      VEDO_ADMIN_PASSWORD: ${VEDO_ADMIN_PASSWORD:-admin}
      VEDO_ALICE_PASSWORD: ${VEDO_ALICE_PASSWORD:-password}
      VEDO_GUEST_PASSWORD: ${VEDO_GUEST_PASSWORD:-guest}
    command:
      - /bin/sh
      - -c
      - |
        set -e
        echo "[keycloak-init] Validating environment variables..."
        missing=0
        for var in VEDO_BACKEND_CLIENT_SECRET VEDO_ADMIN_PASSWORD VEDO_ALICE_PASSWORD VEDO_GUEST_PASSWORD; do
          eval val="\$$var"
          if [ -z "$$val" ]; then
            echo "[keycloak-init] FATAL: $$var is not set or empty"
            missing=1
          else
            echo "[keycloak-init]   $$var = OK"
          fi
        done
        if [ $$missing -ne 0 ]; then
          echo "[keycloak-init] Aborting — set missing variables in .env and restart."
          exit 1
        fi
        echo "[keycloak-init] Substituting template..."
        apk add --no-cache gettext > /dev/null
        envsubst < /template > /import/realm-import.json
        chmod 644 /import/realm-import.json
        echo "[keycloak-init] Done. realm-import.json generated."
    restart: "no"

  keycloak:
    image: quay.io/keycloak/keycloak:26.1
    command: start --import-realm
    ports:
      - "${KEYCLOAK_PORT:-8080}:8080"
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://db:5432/keycloak
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: ${KEYCLOAK_DB_PASSWORD:-CHANGEME-keycloak-password}
      KC_HOSTNAME: ${KEYCLOAK_HOSTNAME:-localhost}
      KC_HTTP_ENABLED: "true"
      KC_HOSTNAME_STRICT: "false"
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN:-admin}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-CHANGEME-admin-password}
      VEDO_BACKEND_CLIENT_SECRET: ${VEDO_BACKEND_CLIENT_SECRET:-changeme-vedo-backend-secret}
    volumes:
      - keycloak_import:/opt/keycloak/data/import
    depends_on:
      keycloak-init:
        condition: service_completed_successfully
      db:
        condition: service_healthy
    networks:
      - internal
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "bash -c '</dev/tcp/localhost/8080'"]
      interval: 30s
      timeout: 5s
      retries: 10
      start_period: 60s

networks:
  internal:
    driver: bridge

volumes:
  chroma_data:
  embedding_cache:
  db_data:
  keycloak_import:
