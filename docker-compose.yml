# docker-compose.yml — Base configuration (shared between dev and prod)
# Dev: docker compose up (auto-merges docker-compose.override.yml)
# Prod: docker compose -f docker-compose.yml -f docker-compose.production.yml up -d

name: ${COMPOSE_PROJECT_NAME:-vedo}

services:
  chroma:
    image: chromadb/chroma:0.6.3
    environment:
      - IS_PERSISTENT=TRUE
    volumes:
      - chroma_data:/chroma/chroma
    networks:
      - internal
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/heartbeat')",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  embedding:
    build:
      context: ./embedding
      target: production
    dns:
      # Явные публичные DNS — контейнер не зависит от DNS хост-системы (VPN).
      # Без этого VPN-клиент может заблокировать разрешение huggingface.co.
      - 8.8.8.8
      - 1.1.1.1
    environment:
      - EMBEDDING_MODEL=BAAI/bge-small-en-v1.5
      - CACHE_DIR=/data/cache
    volumes:
      - embedding_cache:/data/cache
    networks:
      - internal
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8001/health')",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    depends_on:
      chroma:
        condition: service_healthy

  backend:
    build:
      context: ./backend
      target: production
    env_file: .env
    environment:
      # Keep issuer validation aligned with browser-issued tokens while letting
      # the backend fetch JWKS over Docker's internal network.
      KEYCLOAK_PUBLIC_URL: "${KEYCLOAK_PUBLIC_URL:-http://localhost:8080}"
      KEYCLOAK_JWKS_URL: "${KEYCLOAK_JWKS_URL:-http://keycloak:8080}"
    ports:
      - "${BACKEND_PORT:-3000}:3000"
    networks:
      - internal
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 40s
    volumes:
      - db_data:/data

  frontend:
    build:
      context: ./frontend
      target: production
    networks:
      - internal
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:80/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    depends_on:
      - backend

  keycloak-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: keycloak
      POSTGRES_USER: keycloak
      POSTGRES_PASSWORD: ${KEYCLOAK_DB_PASSWORD:-keycloak}
    volumes:
      - keycloak_db_data:/var/lib/postgresql/data
    networks:
      - internal
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U keycloak"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  keycloak:
    image: quay.io/keycloak/keycloak:26.1
    command: start --import-realm
    ports:
      - "${KEYCLOAK_PORT:-8080}:8080"
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://keycloak-db:5432/keycloak
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: ${KEYCLOAK_DB_PASSWORD:-keycloak}
      KC_HOSTNAME: ${KEYCLOAK_HOSTNAME:-localhost}
      KC_HTTP_ENABLED: "true"
      KC_HOSTNAME_STRICT: "false"
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN:-admin}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin}
      VEDO_BACKEND_CLIENT_SECRET: ${VEDO_BACKEND_CLIENT_SECRET:-changeme-vedo-backend-secret}
    volumes:
      - ./keycloak/realm-import.json:/opt/keycloak/data/import/realm-import.json
    depends_on:
      keycloak-db:
        condition: service_healthy
    networks:
      - internal
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/realms/master"]
      interval: 30s
      timeout: 5s
      retries: 10
      start_period: 60s

networks:
  internal:
    driver: bridge

volumes:
  chroma_data:
  embedding_cache:
  db_data:
  keycloak_db_data:
