name: E2E Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  compose-lint:
    name: Docker Compose config lint
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - name: Validate compose files & port uniqueness
        run: ./scripts/validate-compose-ports.sh

      - name: Validate keycloak template substitution
        run: ./scripts/validate-keycloak-template.sh

      - name: Validate sqlx migrations
        run: bash scripts/validate-migrations.sh

  playwright:
    name: Playwright E2E
    runs-on: ubuntu-22.04
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Enable pnpm (corepack)
        run: corepack enable && corepack prepare pnpm@11.9.0 --activate

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Build frontend
        run: pnpm run build

      - name: Run Playwright tests (chromium)
        run: pnpm run test:e2e --project=chromium
        env:
          CI: true
