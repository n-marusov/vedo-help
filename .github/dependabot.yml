version: 2
updates:
  # Rust backend
  - package-ecosystem: cargo
    directory: /backend/
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 10
    labels:
      - dependencies
      - rust

  # Frontend (npm)
  - package-ecosystem: npm
    directory: /frontend/
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 10
    labels:
      - dependencies
      - frontend

  # Python embedding service
  - package-ecosystem: pip
    directory: /embedding/
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 10
    labels:
      - dependencies
      - python

  # Docker images
  - package-ecosystem: docker
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - docker
