pre-commit:
  commands:
    biome-check:
      glob: "*.{js,ts,cjs,mjs,d.cts,d.mts,jsx,tsx,json,jsonc,css,vue}"
      run: frontend/node_modules/.bin/biome check --config-path=frontend/biome.json --write --unsafe --no-errors-on-unmatched --files-ignore-unknown=true --colors=off {staged_files}
      stage_fixed: true
    rust-fmt:
      glob: "*.rs"
      run: cd backend && cargo fmt
      stage_fixed: true

pre-push:
  commands:
    biome-ci:
      glob: "*.{js,ts,cjs,mjs,d.cts,d.mts,jsx,tsx,json,jsonc,css,vue}"
      run: frontend/node_modules/.bin/biome ci --config-path=frontend/biome.json --no-errors-on-unmatched --files-ignore-unknown=true --colors=off {push_files}
    rust-clippy:
      glob: "*.rs"
      run: cd backend && cargo clippy -- -D warnings
