pre-commit:
  commands:
    biome-check:
      glob: "*.{js,ts,cjs,mjs,d.cts,d.mts,jsx,tsx,json,jsonc,css}"
      run: frontend/node_modules/.bin/biome check --write --no-errors-on-unmatched --files-ignore-unknown=true --colors=off {staged_files}
      stage_fixed: true
    rust-fmt:
      glob: "*.rs"
      run: cd backend && cargo fmt
      stage_fixed: true
    ruff-format:
      glob: "*.py"
      run: uvx ruff format --config embedding/pyproject.toml {staged_files}
      stage_fixed: true
    ruff-lint:
      glob: "*.py"
      run: uvx ruff check --fix --config embedding/pyproject.toml {staged_files}
      stage_fixed: true

pre-push:
  commands:
    biome-ci:
      glob: "*.{js,ts,cjs,mjs,d.cts,d.mts,jsx,tsx,json,jsonc,css}"
      run: frontend/node_modules/.bin/biome ci --no-errors-on-unmatched --files-ignore-unknown=true --colors=off {push_files}
    rust-clippy:
      glob: "*.rs"
      run: cd backend && cargo clippy -- -D warnings
    ruff-ci:
      glob: "*.py"
      run: uvx ruff check --config embedding/pyproject.toml {push_files}
